models:
  # ============================================================
  # 用户模块 (user)
  # ============================================================
  User:
    description: 用户模型
    status: active
    frontend_page: /admin/users
    properties:
      id:
        type: bigint
        description: 用户 ID
      username:
        type: string
        description: 用户名
        unique: true
        maxLength: 255
      email:
        type: string
        format: email
        description: 邮箱
      password:
        type: string
        maxLength: 255
        description: 密码（哈希后存储）
        sensitive: true
      profile_picture:
        type: string
        nullable: true
        description: 个人资料图片
      bio:
        type: string
        nullable: true
        description: 个人简介
      is_active:
        type: boolean
        default: true
        description: 是否激活
      is_superuser:
        type: boolean
        default: false
        description: 是否为超级管理员
      is_staff:
        type: boolean
        default: false
        description: 是否为工作人员
      date_joined:
        type: datetime
        default: now
        description: 注册时间
      last_login_at:
        type: datetime
        nullable: true
        description: 上次登录时间
      last_login_ip:
        type: string
        nullable: true
        description: 上次登录 IP
      register_ip:
        type: string
        nullable: true
        description: 注册 IP
      locale:
        type: string
        default: zh_CN
        description: 语言设置
      is_2fa_enabled:
        type: boolean
        default: false
        description: 是否启用双因素认证
      totp_secret:
        type: string
        nullable: true
        maxLength: 32
        description: TOTP 密钥
        sensitive: true
      backup_codes:
        type: text
        nullable: true
        description: 备用码(JSON格式存储)
        sensitive: true
      total_storage:
        type: bigint
        default: 1073741824
        description: 总存储空间（字节，默认1GB）
      used_storage:
        type: bigint
        default: 0
        description: 已用存储空间（字节）
    module: user
    orm: true
    table: users
    indexes:
      - name: idx_users_username
        columns:
          - username
        unique: true
        comment: 用户名唯一索引
      - name: idx_users_email
        columns:
          - email
        unique: true
        comment: 邮箱唯一索引
      - name: idx_users_is_active
        columns:
          - is_active
        comment: 激活状态索引
    relationships:
      roles:
        target: Role
        secondary: user_role_assignments
        back_populates: users
        primaryjoin: User.id == user_role_assignments.c.user_id
        secondaryjoin: user_role_assignments.c.role_id == Role.id

  UserCreate:
    type: schema
    description: 用户创建请求模型
    properties:
      username:
        type: string
        minLength: 3
        maxLength: 150
        description: 用户名
      email:
        type: string
        format: email
        description: 邮箱
      password:
        type: string
        minLength: 6
        writeOnly: true
        description: 密码
      password_confirm:
        type: string
        minLength: 6
        writeOnly: true
        description: 确认密码
    required:
      - username
      - password
      - password_confirm

  UserUpdate:
    type: schema
    description: 用户更新请求模型
    properties:
      username:
        type: string
        minLength: 3
        maxLength: 150
        description: 用户名
      email:
        type: string
        format: email
        description: 邮箱
      profile_picture:
        type: string
        nullable: true
        description: 个人资料图片
      bio:
        type: string
        nullable: true
        description: 个人简介
      locale:
        type: string
        default: zh_CN
        description: 语言设置

  ProfileUpdateRequest:
    type: schema
    description: 用户资料更新请求
    properties:
      username:
        type: string
        nullable: true
        description: 用户名
      email:
        type: string
        nullable: true
        format: email
        description: 邮箱
      bio:
        type: string
        nullable: true
        description: 个人简介
      locale:
        type: string
        nullable: true
        description: 语言设置

  PasswordChange:
    type: schema
    description: 密码修改请求模型
    properties:
      old_password:
        type: string
        writeOnly: true
        description: 当前密码
      new_password:
        type: string
        minLength: 6
        writeOnly: true
        description: 新密码
      new_password_confirm:
        type: string
        minLength: 6
        writeOnly: true
        description: 确认新密码
    required:
      - old_password
      - new_password
      - new_password_confirm

  UserBlock:
    description: 用户屏蔽/拉黑模型
    status: active
    frontend_page: /admin/users
    properties:
      id:
        type: bigint
        description: 屏蔽记录ID
      blocker:
        type: bigint
        description: 屏蔽者用户ID
        foreignKey: User
      blocked_user:
        type: bigint
        description: 被屏蔽用户ID
        foreignKey: User
      reason:
        type: string
        nullable: true
        maxLength: 500
        description: 屏蔽原因
      created_at:
        type: string
        format: date-time
        description: 屏蔽时间
    module: user
    orm: true
    table: user_blocks
    indexes:
      - name: idx_user_blocks_unique
        columns:
          - blocker
          - blocked_user
        unique: true
        comment: 唯一屏蔽关系索引

  UserSession:
    description: 用户会话模型
    status: active
    properties:
      id:
        type: bigint
        description: 会话 ID
      user_id:
        type: bigint
        foreignKey: User
        description: 用户 ID
      session_token:
        type: string
        maxLength: 512
        description: 会话令牌
      refresh_token:
        type: string
        maxLength: 512
        nullable: true
        description: 刷新令牌
      ip_address:
        type: string
        maxLength: 45
        nullable: true
        description: IP 地址
      user_agent:
        type: text
        nullable: true
        description: 用户代理
      is_active:
        type: boolean
        default: true
        description: 是否活跃
      expires_at:
        type: string
        format: date-time
        description: 过期时间
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    module: user
    orm: true
    table: user_sessions
    indexes:
      - name: idx_user_sessions_user
        columns:
          - user_id
        comment: 用户会话索引
      - name: idx_user_sessions_token
        columns:
          - session_token
        unique: true
        comment: 令牌唯一索引

  # ============================================================
  # 安全模块 (security)
  # ============================================================
  LoginAttempt:
    description: 登录尝试记录模型
    status: active
    properties:
      id:
        type: bigint
        description: 记录 ID
      user_id:
        type: bigint
        nullable: true
        foreignKey: User
        description: 用户 ID
      username:
        type: string
        maxLength: 255
        description: 尝试登录的用户名
      ip_address:
        type: string
        maxLength: 45
        description: IP 地址
      user_agent:
        type: text
        nullable: true
        description: 用户代理
      success:
        type: boolean
        default: false
        description: 是否成功
      failure_reason:
        type: string
        nullable: true
        maxLength: 255
        description: 失败原因
      created_at:
        type: string
        format: date-time
        description: 尝试时间
    module: security
    orm: true
    table: login_attempts
    indexes:
      - name: idx_login_attempts_user
        columns:
          - user_id
        comment: 用户登录尝试索引
      - name: idx_login_attempts_ip
        columns:
          - ip_address
        comment: IP 登录尝试索引
      - name: idx_login_attempts_created
        columns:
          - created_at
        order: DESC
        comment: 时间索引

  TokenBlacklist:
    description: Token 黑名单模型
    status: active
    properties:
      id:
        type: bigint
        description: 记录 ID
      token_jti:
        type: string
        maxLength: 128
        description: Token JTI
      token_type:
        type: string
        maxLength: 20
        default: access
        description: Token 类型 (access/refresh)
      user_id:
        type: bigint
        nullable: true
        foreignKey: User
        description: 用户 ID
      expires_at:
        type: string
        format: date-time
        description: Token 过期时间
      blacklisted_at:
        type: string
        format: date-time
        description: 加入黑名单时间
      reason:
        type: string
        nullable: true
        maxLength: 255
        description: 加入黑名单原因
    module: security
    orm: true
    table: token_blacklist
    indexes:
      - name: idx_token_blacklist_jti
        columns:
          - token_jti
        unique: true
        comment: JTI 唯一索引
      - name: idx_token_blacklist_expires
        columns:
          - expires_at
        comment: 过期时间索引

  SensitiveWord:
    description: 敏感词模型
    status: active
    frontend_page: /admin/sensitive-words
    properties:
      id:
        type: bigint
        description: 敏感词 ID
      word:
        type: string
        maxLength: 200
        description: 敏感词内容
      replacement:
        type: string
        maxLength: 200
        description: 替换内容
      level:
        type: integer
        default: 1
        description: 级别
      is_active:
        type: boolean
        default: true
        description: 是否激活
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    module: security
    orm: true
    table: sensitive_words
    indexes:
      - name: idx_sensitive_words_word
        columns:
          - word
        unique: true
        comment: 敏感词唯一索引

  GDPRConsent:
    description: GDPR 用户同意记录模型
    status: active
    properties:
      id:
        type: bigint
        description: 记录 ID
      user_id:
        type: bigint
        foreignKey: User
        description: 用户 ID
      consent_type:
        type: string
        maxLength: 100
        description: 同意类型
      granted:
        type: boolean
        default: true
        description: 是否同意
      ip_address:
        type: string
        maxLength: 45
        nullable: true
        description: IP 地址
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: security
    orm: true
    table: gdpr_consents
    indexes:
      - name: idx_gdpr_consents_user
        columns:
          - user_id
        comment: 用户同意记录索引

  FieldPermission:
    description: 字段级权限控制模型
    status: active
    frontend_page: /admin/user-security
    properties:
      id:
        type: bigint
        description: 权限 ID
      role_id:
        type: bigint
        foreignKey: Role
        description: 角色 ID
      model_name:
        type: string
        maxLength: 100
        description: 模型名称
      field_name:
        type: string
        maxLength: 100
        description: 字段名称
      can_read:
        type: boolean
        default: true
        description: 是否可读
      can_write:
        type: boolean
        default: false
        description: 是否可写
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: security
    orm: true
    table: field_permissions

  # ============================================================
  # 权限模块 (rbac)
  # ============================================================
  Role:
    description: 角色模型
    status: active
    frontend_page: /admin/roles
    properties:
      id:
        type: bigint
        description: 角色 ID
      name:
        type: string
        maxLength: 100
        description: 角色名称
      slug:
        type: string
        maxLength: 100
        unique: true
        description: 角色标识
      description:
        type: string
        nullable: true
        description: 角色描述
      is_system:
        type: boolean
        default: false
        description: 是否系统内置
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    module: rbac
    orm: true
    table: roles
    indexes:
      - name: idx_roles_slug
        columns:
          - slug
        unique: true
    relationships:
      users:
        target: User
        secondary: user_role_assignments
        back_populates: roles
        primaryjoin: Role.id == user_role_assignments.c.role_id
        secondaryjoin: user_role_assignments.c.user_id == User.id

  Capability:
    description: 权限能力模型
    status: active
    properties:
      id:
        type: bigint
        description: 能力 ID
      codename:
        type: string
        maxLength: 100
        unique: true
        description: 能力代码
      name:
        type: string
        maxLength: 100
        description: 能力名称
      description:
        type: string
        nullable: true
        description: 能力描述
      module:
        type: string
        maxLength: 50
        nullable: true
        description: 所属模块
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: rbac
    orm: true
    table: capabilities
    indexes:
      - name: idx_capabilities_codename
        columns:
          - codename
        unique: true
        comment: 能力代码唯一索引

  RoleCapability:
    description: 角色-权限能力关联模型
    status: active
    properties:
      id:
        type: bigint
        description: 关联 ID
      role_id:
        type: bigint
        foreignKey: Role
        description: 角色 ID
      capability_id:
        type: bigint
        foreignKey: Capability
        description: 能力 ID
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: rbac
    orm: true
    table: role_capabilities
    indexes:
      - name: idx_role_capabilities_role
        columns:
          - role_id
      - name: idx_role_capabilities_capability
        columns:
          - capability_id
      - name: idx_role_capabilities_unique
        columns:
          - role_id
          - capability_id
        unique: true
        comment: 唯一关联索引

  UserRole:
    description: 用户角色关联模型
    status: active
    properties:
      id:
        type: bigint
        description: 关联 ID
      user_id:
        type: bigint
        foreignKey: User
        description: 用户 ID
      role_id:
        type: bigint
        foreignKey: Role
        description: 角色 ID
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: rbac
    orm: true
    table: user_role_assignments
    indexes:
      - name: idx_user_roles_user
        columns:
          - user_id
      - name: idx_user_roles_role
        columns:
          - role_id
      - name: idx_user_roles_unique
        columns:
          - user_id
          - role_id
        unique: true
        comment: 唯一关联索引

  PermissionAuditLog:
    description: 权限审计日志模型
    status: active
    properties:
      id:
        type: bigint
        description: 日志 ID
      user_id:
        type: bigint
        foreignKey: User
        description: 操作用户 ID
      action:
        type: string
        maxLength: 50
        description: 操作类型
      target_type:
        type: string
        maxLength: 50
        description: 目标类型
      target_id:
        type: bigint
        nullable: true
        description: 目标 ID
      details:
        type: text
        nullable: true
        description: 操作详情
      created_at:
        type: string
        format: date-time
        description: 创建时间
    module: rbac
    orm: true
    table: permission_audit_logs
    indexes:
      - name: idx_perm_audit_user
        columns:
          - user_id
      - name: idx_perm_audit_action
        columns:
          - action
      - name: idx_perm_audit_created
        columns:
          - created_at
        order: DESC

  # ============================================================
  # 文件存储模块 (file) — 网盘核心
  # ============================================================
  FileItem:
    description: 文件/存储项模型
    status: active
    frontend_page: /drive
    properties:
      id:
        type: bigint
        description: 文件 ID
      user_id:
        type: bigint
        description: 所有者用户 ID
        foreignKey: User
      folder_id:
        type: bigint
        nullable: true
        description: 所属文件夹 ID
        foreignKey: Folder
      filename:
        type: string
        maxLength: 255
        description: 文件名
      original_filename:
        type: string
        nullable: true
        maxLength: 255
        description: 原始文件名
      file_path:
        type: string
        maxLength: 500
        description: 存储路径
        sensitive: true
      file_url:
        type: string
        maxLength: 500
        nullable: true
        description: 文件访问 URL
      file_size:
        type: bigint
        default: 0
        description: 文件大小（字节）
      mime_type:
        type: string
        maxLength: 100
        nullable: true
        description: MIME 类型
      file_type:
        type: string
        maxLength: 20
        default: other
        description: 文件类型 (image/video/audio/document/archive/other)
      storage_driver:
        type: string
        maxLength: 50
        default: local
        description: 存储驱动 (local/s3/minio)
      storage_bucket:
        type: string
        maxLength: 100
        nullable: true
        description: 存储桶名称
      storage_key:
        type: string
        maxLength: 500
        nullable: true
        description: 存储驱动中的对象 key
      file_hash:
        type: string
        maxLength: 64
        nullable: true
        description: 文件 SHA256 哈希
      is_folder:
        type: boolean
        default: false
        description: 是否为文件夹
      is_favorite:
        type: boolean
        default: false
        description: 是否收藏
      is_encrypted:
        type: boolean
        default: false
        description: 是否加密存储
      thumbnail_url:
        type: string
        maxLength: 500
        nullable: true
        description: 缩略图 URL
      width:
        type: integer
        nullable: true
        description: 宽度（图片/视频）
      height:
        type: integer
        nullable: true
        description: 高度（图片/视频）
      duration:
        type: integer
        nullable: true
        description: 时长秒数（音视频）
      description:
        type: text
        nullable: true
        description: 文件描述
      download_count:
        type: integer
        default: 0
        description: 下载次数
      sort_order:
        type: integer
        default: 0
        description: 排序顺序
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
      deleted_at:
        type: string
        format: date-time
        nullable: true
        description: 删除时间（软删除）
    module: file
    orm: true
    table: file_items
    indexes:
      - name: idx_file_items_user
        columns:
          - user_id
        comment: 用户文件索引
      - name: idx_file_items_folder
        columns:
          - folder_id
        comment: 文件夹文件索引
      - name: idx_file_items_user_folder
        columns:
          - user_id
          - folder_id
        comment: 用户文件夹文件索引
      - name: idx_file_items_hash
        columns:
          - file_hash
        comment: 文件哈希索引（秒传）
      - name: idx_file_items_file_type
        columns:
          - file_type
        comment: 文件类型索引
      - name: idx_file_items_created
        columns:
          - created_at
        order: DESC
        comment: 创建时间索引
      - name: idx_file_items_favorite
        columns:
          - user_id
          - is_favorite
        comment: 收藏文件索引
      - name: idx_file_items_deleted
        columns:
          - deleted_at
        comment: 软删除索引
      - name: idx_file_items_user_filename
        columns:
          - user_id
          - filename
        comment: 用户文件名搜索索引

  Folder:
    description: 文件夹模型
    status: active
    frontend_page: /drive
    properties:
      id:
        type: bigint
        description: 文件夹 ID
      user_id:
        type: bigint
        description: 所有者用户 ID
        foreignKey: User
      parent_id:
        type: bigint
        nullable: true
        description: 父文件夹 ID
        foreignKey: Folder
      name:
        type: string
        maxLength: 255
        description: 文件夹名称
      description:
        type: string
        nullable: true
        description: 文件夹描述
      color:
        type: string
        maxLength: 10
        nullable: true
        description: 文件夹颜色标记
      icon:
        type: string
        maxLength: 50
        nullable: true
        description: 文件夹图标
      is_shared:
        type: boolean
        default: false
        description: 是否已共享
      sort_order:
        type: integer
        default: 0
        description: 排序顺序
      created_at:
        type: string
        format: date-time
        description: 创建时间
      updated_at:
        type: string
        format: date-time
        description: 更新时间
    module: file
    orm: true
    table: folders
    indexes:
      - name: idx_folders_user
        columns:
          - user_id
        comment: 用户文件夹索引
      - name: idx_folders_parent
        columns:
          - parent_id
        comment: 父文件夹索引
      - name: idx_folders_user_parent
        columns:
          - user_id
          - parent_id
        comment: 用户父文件夹索引
      - name: idx_folders_user_name
        columns:
          - user_id
          - parent_id
          - name
        unique: true
        comment: 同一目录下文件夹名唯一

  FileFingerprint:
    description: 文件指纹/哈希模型（用于秒传和去重）
    status: active
    properties:
      id:
        type: bigint
        description: 指纹 ID
      hash:
        type: string
        maxLength: 64
        unique: true
        description: 文件 SHA256 哈希
      file_size:
        type: bigint
        description: 文件大小
      mime_type:
        type: string
        maxLength: 100
        nullable: true
        description: MIME 类型
      storage_path:
        type: string
        maxLength: 500
        description: 存储路径
        sensitive: true
      reference_count:
        type: integer
        default: 1
        description: 引用计数
      created_at:
        type: string
